name: CI/CD

on:
  # Push on main and release tags
  push:
    branches:
      - 'main'
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

  # PR
  pull_request:
    branches:
      - 'main'

  # Manual trigger
  workflow_dispatch:
    inputs:
      version:
        required: false
        description: Extensions version
        type: string
      is_release:
        required: false
        description: Create Extensions Release
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:

  build:
    name: CI/CD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout main repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: denniskuijs/openremote
          path: openremote
          ref: master
          sparse-checkout: profile
          sparse-checkout-cone-mode: false

      - name: Set up JDK 21 and gradle cache
        id: java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Check if main repo
        id: is_main_repo
        run: |
          if [ $GITHUB_REPOSITORY == 'denniskuijs/extensions' ]; then
            echo "value=true" >> $GITHUB_OUTPUT
          fi

      - name: Update OpenRemote version in gradle.properties
        if: ${{ github.event_name != 'pull_request' && inputs.version != '' }}
        run: |
          CURRENT=$(grep '^openremoteVersion' gradle.properties | sed 's/^openremoteVersion = //')
          if [ "$CURRENT" != "$VERSION" ]; then
            sed -i "s/^openremoteVersion = .*/openremoteVersion = $VERSION/" gradle.properties
            git add gradle.properties
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit -m "Update OpenRemote version to $VERSION skip-checks:true"
            git push
          else
            echo "Version unchanged, skipping commit."
          fi
        env:
          VERSION: ${{ inputs.version }}

